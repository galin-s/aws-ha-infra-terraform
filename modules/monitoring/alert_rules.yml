groups:
  - name: node_alerts

    rules:
      - alert: HighCPUUsage

        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80

        for: 2m

        labels:
          severity: warning

        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 80% for more than 2 minutes."
